<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcCoin — Node Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #080a0e;
    --surface:  #0d1018;
    --border:   #1a2030;
    --arc:      #f0a500;
    --arc-dim:  #7a5200;
    --green:    #00e676;
    --red:      #ff5252;
    --blue:     #4fc3f7;
    --text:     #c8d0e0;
    --sub:      #445060;
    --mono:     'Share Tech Mono', monospace;
    --display:  'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 40px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,10,14,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo-text {
    font-family: var(--display);
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--arc);
    letter-spacing: 0.06em;
  }

  .logo-sub {
    font-size: 0.65rem;
    color: var(--sub);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .node-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: var(--sub);
  }

  .node-selector select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  .status-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .clock {
    font-size: 0.75rem;
    color: var(--arc);
    letter-spacing: 0.1em;
  }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 300px 1fr 300px;
    grid-template-rows: auto auto 1fr;
    gap: 1px;
    min-height: calc(100vh - 65px);
    background: var(--border);
  }

  .panel {
    background: var(--bg);
    padding: 20px;
    animation: fadein 0.4s ease both;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-title {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--arc);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── STATS ROW ── */
  .stats-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
  }

  .stat {
    background: var(--bg);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadein 0.4s ease both;
  }

  .stat:nth-child(1) { animation-delay: 0.05s; }
  .stat:nth-child(2) { animation-delay: 0.1s; }
  .stat:nth-child(3) { animation-delay: 0.15s; }
  .stat:nth-child(4) { animation-delay: 0.2s; }
  .stat:nth-child(5) { animation-delay: 0.25s; }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sub);
  }

  .stat-value {
    font-family: var(--display);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--arc);
    line-height: 1;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.blue  { color: var(--blue); }

  /* ── LEFT PANEL — WALLET ── */
  .panel-wallet { grid-column: 1; grid-row: 2 / 4; }

  .wallet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .wallet-addr {
    font-size: 0.78rem;
    color: var(--arc);
    word-break: break-all;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .wallet-balance {
    font-family: var(--display);
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--green);
  }

  .wallet-balance span {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--sub);
    margin-left: 4px;
  }

  /* ── FORMS ── */
  .form-group {
    margin-bottom: 10px;
  }

  .form-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sub);
    display: block;
    margin-bottom: 4px;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 8px 10px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus {
    border-color: var(--arc-dim);
  }

  .btn {
    width: 100%;
    padding: 9px;
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }

  .btn-primary {
    background: var(--arc);
    color: #000;
    font-weight: bold;
  }

  .btn-primary:hover { background: #ffc107; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-secondary:hover { border-color: var(--arc-dim); color: var(--arc); }

  .btn-green {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
  }

  .btn-green:hover { background: rgba(0,230,118,0.1); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* ── CENTER PANEL — CHAIN ── */
  .panel-chain { grid-column: 2; grid-row: 2; }
  .panel-mempool { grid-column: 2; grid-row: 3; }

  .block-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
  }

  .block-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--arc);
    border-radius: 4px;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
    animation: fadein 0.3s ease both;
  }

  .block-item:hover { border-color: var(--arc); background: var(--surface); }

  .block-index {
    font-family: var(--display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--arc);
  }

  .block-meta { font-size: 0.65rem; color: var(--sub); line-height: 1.8; }
  .block-meta b { color: var(--text); }

  .block-txcount {
    font-size: 0.65rem;
    color: var(--blue);
    text-align: right;
  }

  .empty-state {
    color: var(--sub);
    font-size: 0.75rem;
    text-align: center;
    padding: 24px 0;
    letter-spacing: 0.1em;
  }

  /* ── TX LIST ── */
  .tx-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    font-size: 0.65rem;
    animation: fadein 0.3s ease both;
  }

  .tx-addr { color: var(--sub); }
  .tx-addr b { color: var(--arc); }
  .tx-amount { color: var(--green); font-size: 0.75rem; }
  .tx-nonce { color: var(--sub); }

  /* ── RIGHT PANEL — PEERS ── */
  .panel-peers { grid-column: 3; grid-row: 2; }
  .panel-actions { grid-column: 3; grid-row: 3; }

  .peer-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .peer-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 0.82rem;
    color: var(--blue);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: fadein 0.3s ease both;
  }

  .peer-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  /* ── LOG ── */
  .log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    font-size: 0.65rem;
    color: var(--sub);
    height: 100px;
    overflow-y: auto;
    line-height: 1.8;
  }

  .log-entry { color: var(--text); }
  .log-entry.ok { color: var(--green); }
  .log-entry.err { color: var(--red); }
  .log-entry.info { color: var(--arc); }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--arc);
    color: var(--arc);
    font-size: 0.88rem;
    padding: 10px 16px;
    border-radius: 6px;
    z-index: 1000;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-text">ARC</div>
    <div class="logo-sub">Node Dashboard</div>
  </div>
  <div class="header-right">
    <div class="node-selector">
      <span>NODE</span>
      <select id="nodeSelect" onchange="switchNode()">
        <option value="http://127.0.0.1:5001">127.0.0.1:5001</option>
        <option value="http://127.0.0.1:5002">127.0.0.1:5002</option>
        <option value="http://127.0.0.1:5003">127.0.0.1:5003</option>
      </select>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<main>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Chain Height</div>
      <div class="stat-value" id="statHeight">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pending TXs</div>
      <div class="stat-value blue" id="statPending">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Peers</div>
      <div class="stat-value green" id="statPeers">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Difficulty</div>
      <div class="stat-value" id="statDifficulty">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Last Block</div>
      <div class="stat-value blue" id="statLastBlock" style="font-size:0.8rem;padding-top:6px">—</div>
    </div>
  </div>

  <!-- LEFT: WALLET -->
  <div class="panel panel-wallet">
    <div class="panel-title">Wallet</div>

    <div id="walletCard" style="display:none" class="wallet-card">
      <div class="wallet-addr" id="walletAddr">—</div>
      <div class="wallet-balance" id="walletBalance">0.00 <span>ARC</span></div>
    </div>

    <button class="btn btn-secondary" onclick="createWallet()" style="margin-bottom:10px">
      ⊕ Generate New Wallet
    </button>

    <div class="divider"></div>
    <div class="panel-title">Send Transaction</div>

    <div class="form-group">
      <label class="form-label">Recipient Address</label>
      <input type="text" id="sendTo" placeholder="ARC..."/>
    </div>
    <div class="form-group">
      <label class="form-label">Amount (ARC)</label>
      <input type="number" id="sendAmount" placeholder="0.00" step="0.01"/>
    </div>
    <button class="btn btn-primary" onclick="sendTransaction()">Send →</button>

    <div class="divider"></div>
    <div class="panel-title">Seed Balance <span style="color:var(--sub);font-size:0.5rem">(demo)</span></div>
    <div class="form-group">
      <label class="form-label">Amount (ARC)</label>
      <input type="number" id="seedAmount" placeholder="100" value="100"/>
    </div>
    <button class="btn btn-secondary" onclick="seedBalance()">Seed My Wallet</button>
  </div>

  <!-- CENTER: CHAIN -->
  <div class="panel panel-chain">
    <div class="panel-title">Blockchain</div>
    <div class="block-list" id="blockList">
      <div class="empty-state">No blocks yet</div>
    </div>
  </div>

  <!-- CENTER: MEMPOOL -->
  <div class="panel panel-mempool">
    <div class="panel-title">Mempool</div>
    <div class="tx-list" id="txList">
      <div class="empty-state">Mempool is empty</div>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-green" onclick="mine()">⛏ Mine Block</button>
    </div>
  </div>

  <!-- RIGHT: PEERS -->
  <div class="panel panel-peers">
    <div class="panel-title">Peers</div>
    <div class="peer-list" id="peerList">
      <div class="empty-state">No peers</div>
    </div>
    <div style="margin-top:12px; display:flex; gap:6px">
      <input type="text" id="peerInput" placeholder="http://127.0.0.1:5002" style="flex:1"/>
      <button class="btn btn-secondary" style="width:auto;padding:8px 12px" onclick="addPeer()">Add</button>
    </div>
  </div>

  <!-- RIGHT: LOG -->
  <div class="panel panel-actions">
    <div class="panel-title">Activity Log</div>
    <div class="log" id="log"></div>
    <div style="margin-top:10px">
      <button class="btn btn-secondary" onclick="refresh()">↻ Refresh</button>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  let NODE = 'http://127.0.0.1:5001';
  let wallet = {};

  // ── CLOCK ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toTimeString().slice(0,8);
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── NODE SWITCH ──
function switchNode() {
    NODE = document.getElementById('nodeSelect').value;
    log(`Switched to ${NODE}`, 'info');
    // show this node's wallet if it exists
    const w = wallets[NODE];
    if (w) {
        document.getElementById('walletCard').style.display = 'block';
        document.getElementById('walletAddr').textContent = w.address;
    } else {
        document.getElementById('walletCard').style.display = 'none';
    }
    refresh();
}

  // ── TOAST ──
  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.className = 'toast', 2500);
  }

  // ── LOG ──
  function log(msg, type='') {
    const el = document.getElementById('log');
    const now = new Date().toTimeString().slice(0,8);
    el.innerHTML += `<div class="log-entry ${type}">[${now}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  // ── API ──
  async function api(method, path, body=null) {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(NODE + path, opts);
    return { status: res.status, data: await res.json() };
  }

  // ── REFRESH ──
  async function refresh() {
    try {
      // chain
      const { data: chain } = await api('GET', '/chain');
      document.getElementById('statHeight').textContent = chain.length;
      renderChain(chain.blocks);

      // mempool
      const { data: mem } = await api('GET', '/mempool');
      document.getElementById('statPending').textContent = mem.pending.length;
      renderMempool(mem.pending);

      // peers
      const { data: peers } = await api('GET', '/peers');
      document.getElementById('statPeers').textContent = peers.peers.length;
      renderPeers(peers.peers);

      // difficulty from latest block
      if (chain.blocks.length > 0) {
        const latest = chain.blocks[chain.blocks.length - 1];
        document.getElementById('statDifficulty').textContent = latest.header.difficulty;
        const d = new Date(latest.header.timestamp * 1000);
        document.getElementById('statLastBlock').textContent = d.toTimeString().slice(0,8);
      }

      // status dot
      document.getElementById('statusDot').className = 'status-dot';

      // wallet balance
      if (wallet) updateBalance();

    } catch(e) {
      document.getElementById('statusDot').className = 'status-dot offline';
      log('Node unreachable', 'err');
    }
  }

  function renderChain(blocks) {
    const el = document.getElementById('blockList');
    if (!blocks.length) { el.innerHTML = '<div class="empty-state">No blocks yet</div>'; return; }
    el.innerHTML = [...blocks].reverse().map(b => `
      <div class="block-item">
        <div class="block-index">#${b.header.index}</div>
        <div class="block-meta">
          <b>nonce</b> ${b.header.nonce}<br>
          <b>prev</b> ${b.header.prev_hash.slice(0,16)}...
        </div>
        <div class="block-txcount">${b.transactions.length} tx</div>
      </div>
    `).join('');
  }

  function renderMempool(txs) {
    const el = document.getElementById('txList');
    if (!txs.length) { el.innerHTML = '<div class="empty-state">Mempool is empty</div>'; return; }
    el.innerHTML = txs.map(tx => `
      <div class="tx-item">
        <div class="tx-addr"><b>${tx.sender.slice(0,14)}...</b> → ${tx.recipient.slice(0,14)}...</div>
        <div class="tx-amount">${tx.amount} ARC</div>
        <div class="tx-nonce">n=${tx.nonce}</div>
      </div>
    `).join('');
  }

  function renderPeers(peers) {
    const el = document.getElementById('peerList');
    if (!peers.length) { el.innerHTML = '<div class="empty-state">No peers</div>'; return; }
    el.innerHTML = peers.map(p => `
      <div class="peer-item">
        <div class="peer-dot"></div>
        ${p}
      </div>
    `).join('');
  }

async function updateBalance() {
    const w = wallets[NODE];
    if (!w) return;
    const { data } = await api('GET', `/balance/${w.address}`);
    document.getElementById('walletBalance').innerHTML =
        `${data.balance.toFixed(2)} <span>ARC</span>`;
}
  // ── WALLET ──
async function createWallet() {
    try {
        const { data } = await api('POST', '/wallet/generate');
        wallets[NODE] = data;
        document.getElementById('walletCard').style.display = 'block';
        document.getElementById('walletAddr').textContent = data.address;
        document.getElementById('walletBalance').innerHTML = '0.00 <span>ARC</span>';
        log(`Wallet created: ${data.address.slice(0,20)}...`, 'ok');
        toast('Wallet generated');
    } catch(e) {
        log('Failed to generate wallet', 'err');
        toast('Error generating wallet', 'error');
    }
}

  async function sendTransaction() {
    const w = wallets[NODE];
    if (!w) { toast('Create a wallet first', 'error'); return; }
    const to = document.getElementById('sendTo').value.trim();
    const amount = parseFloat(document.getElementById('sendAmount').value);
    if (!to || !amount) { toast('Fill in all fields', 'error'); return; }
    try {
        const { status, data } = await api('POST', '/wallet/send', {
            private_key_hex: w.private_key_hex,
            recipient: to,
            amount: amount
        });
        if (status === 200) {
            log(`Sent ${amount} ARC → ${to.slice(0,16)}...`, 'ok');
            toast('Transaction sent');
            refresh();
        } else {
            log(`TX failed: ${data.error}`, 'err');
            toast('Transaction failed', 'error');
        }
    } catch(e) {
        log('Failed to send transaction', 'err');
    }
}

  async function seedBalance() {
    const w = wallets[NODE];
    if (!w) { toast('Create a wallet first', 'error'); return; }
    const amount = parseFloat(document.getElementById('seedAmount').value) || 100;
    const { status } = await api('POST', '/seed', { address: w.address, amount });
    if (status === 200) {
        log(`Seeded ${amount} ARC`, 'ok');
        toast(`Seeded ${amount} ARC`);
        refresh();
    }
}

  async function mine() {
    const { status, data } = await api('POST', '/mine');
    if (status === 200) {
      log('Block mined successfully', 'ok');
      toast('Block mined');
      refresh();
    } else {
      log(`Mine failed: ${data.error}`, 'err');
      toast(data.error, 'error');
    }
  }

  async function addPeer() {
    const url = document.getElementById('peerInput').value.trim();
    if (!url) return;
    const { status } = await api('POST', '/peers', { url });
    if (status === 200) {
      log(`Added peer: ${url}`, 'ok');
      document.getElementById('peerInput').value = '';
      refresh();
    }
  }

  // ── AUTO REFRESH ──
  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
